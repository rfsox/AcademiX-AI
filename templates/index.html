<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiX Pro | كاتب التقارير المكثفة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .report-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: #fff; margin-top: 50px; }
        .result-area { background: #fff; border: 1px solid #dee2e6; border-radius: 15px; padding: 30px; min-height: 400px; position: relative; line-height: 1.8; }
        .action-btns { position: absolute; top: 15px; left: 15px; z-index: 10; }
        #loader { display: none; }
        .btn-primary { background: #4f46e5; border: none; padding: 12px 30px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="report-card p-5">
                <h2 class="text-center fw-bold mb-4 text-indigo"><i class="fas fa-file-alt"></i> منشئ التقارير المكثفة AI</h2>
                <p class="text-center text-muted mb-4">أدخل الموضوع واترك الذكاء الاصطناعي يكتب لك تقريراً أكاديمياً متكاملاً</p>
                
                <div class="input-group mb-4 shadow-sm">
                    <input type="text" id="topic" class="form-control form-control-lg" placeholder="عنوان التقرير (مثلاً: تأثير الاحتباس الحراري على اقتصاد الدول العربية)">
                    <button class="btn btn-primary" onclick="generate()">إنشاء التقرير</button>
                </div>

                <div id="loader" class="text-center my-4">
                    <div class="spinner-grow text-primary" role="status"></div>
                    <p class="mt-2 text-primary fw-bold">جاري صياغة التقرير وتحليل البيانات... قد يستغرق ذلك دقيقة</p>
                </div>

                <div class="result-area" id="report-container">
                    <div class="action-btns">
                        <button class="btn btn-sm btn-outline-dark me-2" onclick="copyText()"><i class="fas fa-copy"></i> نسخ</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="savePDF()"><i class="fas fa-file-pdf"></i> حفظ PDF</button>
                    </div>
                    <div id="output">التقرير سيظهر هنا بشكل منسق...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function generate() {
        const topic = document.getElementById('topic').value;
        if(!topic) return alert("يرجى إدخال الموضوع!");

        document.getElementById('loader').style.display = "block";
        document.getElementById('output').innerHTML = "";

        try {
            const response = await fetch('/generate_report', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({topic: topic})
            });
            const data = await response.json();
            
            if(data.error) throw new Error(data.error);
            
            // معالجة الـ Markdown ليظهر بشكل احترافي
            document.getElementById('output').innerHTML = marked.parse(data.report);
        } catch (e) {
            document.getElementById('output').innerHTML = `<div class="alert alert-danger">خطأ: ${e.message}</div>`;
        } finally {
            document.getElementById('loader').style.display = "none";
        }
    }

    function copyText() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text);
        alert("تم نسخ التقرير إلى الحافظة!");
    }

    function savePDF() {
        const element = document.getElementById('output');
        const opt = {
            margin: 1,
            filename: 'Academic_Report.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
