<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academix AI | Eng Reda</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h2>Academix</h2>
        </div>

        <div class="nav-menu">
            <div class="nav-item active" onclick="showSection('generate')">
                <i class="fas fa-pen-nib"></i>
                <span>توليد تقرير</span>
            </div>
            <div class="nav-item" onclick="showSection('summarize')">
                <i class="fas fa-file-alt"></i>
                <span>تلخيص PDF</span>
            </div>
            <div class="nav-item" onclick="showSection('mcq')">
                <i class="fas fa-list-check"></i>
                <span>أسئلة MCQ</span>
            </div>
        </div>

        <div class="sidebar-footer" style="margin-top: auto; text-align: center; padding: 1rem; border-top: 1px solid var(--glass-border);">
            <p style="font-size: 0.9rem; color: var(--text-dim);">Developed By</p>
            <p style="font-weight: bold; color: var(--accent);">Eng Reda</p>
        </div>
    </nav>

    <main class="main-content">
        
        <section id="generate-section" class="glass-card">
            <div class="card-header">
                <i class="fas fa-magic"></i>
                <h3>محرك التقارير الذكي</h3>
            </div>
            <p style="color: var(--text-dim); margin-bottom: 1rem;">أدخل موضوع البحث وسأقوم بكتابة تقرير أكاديمي كامل لك.</p>
            <textarea id="report-prompt" placeholder="مثال: تأثير الذكاء الاصطناعي على التعليم الطبي..."></textarea>
            <button class="btn-glow" onclick="generateReport()">
                <span>ابدأ التوليد</span>
                <i class="fas fa-rocket"></i>
            </button>
        </section>

        <section id="summarize-section" class="glass-card" style="display:none;">
            <div class="card-header">
                <i class="fas fa-file-pdf"></i>
                <h3>تلخيص الملفات الجامعية</h3>
            </div>
            <div class="drop-zone" onclick="document.getElementById('pdf-file').click()">
                <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: var(--primary);"></i>
                <p>اضغط هنا لرفع ملف PDF (الحد الأقصى 15 صفحة)</p>
                <input type="file" id="pdf-file" hidden accept=".pdf">
            </div>
            <button class="btn-glow accent-btn" onclick="summarizePDF()">
                <span>تلخيص الآن</span>
                <i class="fas fa-bolt"></i>
            </button>
        </section>

        <div id="loader" class="loader-wrapper" style="display:none;">
            <div class="dna-spinner"></div>
            <p>جاري معالجة البيانات أكاديمياً...</p>
        </div>

        <div id="result-area" class="result-wrapper" style="display:none;">
            <div class="result-controls">
                <button class="action-btn copy" onclick="copyResult()"><i class="fas fa-copy"></i> نسخ</button>
                <button class="action-btn pdf" onclick="window.print()"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
            <div class="output-paper markdown-body" id="output-content">
                </div>
            <div style="text-align: center; margin-top: 2rem; color: var(--text-dim);">
                <p>© 2024 Academix AI - Powered By <strong>Eng Reda</strong></p>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // وظائف بسيطة للتنقل بين الأقسام
        function showSection(type) {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            if(type === 'generate') {
                document.getElementById('generate-section').style.display = 'block';
                event.currentTarget.classList.add('active');
            } else if(type === 'summarize') {
                document.getElementById('summarize-section').style.display = 'block';
                event.currentTarget.classList.add('active');
            }
            document.getElementById('result-area').style.display = 'none';
        }

        // ملاحظة: دوال الـ Fetch (JavaScript) يجب أن تكون في ملف script.js 
        // أو تضاف هنا لكي تتصل بـ app.py
    </script>
</body>
</html>
