<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiX-AI | المساعد الأكاديمي الذكي</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --sidebar-width: 260px;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f7f6;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            background: var(--primary-color);
            color: white;
            transition: all 0.3s;
            z-index: 1000;
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid #3e4f5f; text-align: center; }
        
        .nav-link {
            color: #bdc3c7;
            padding: 15px 20px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--accent-color);
            color: white;
        }

        /* Main Content */
        #content {
            margin-right: var(--sidebar-width);
            padding: 30px;
            transition: all 0.3s;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .result-area {
            background: white;
            padding: 20px;
            border-radius: 10px;
            min-height: 200px;
            border-right: 4px solid var(--accent-color);
        }

        /* Loading Spinner */
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #sidebar { right: -100%; }
            #sidebar.active { right: 0; }
            #content { margin-right: 0; }
            #sidebarCollapse { display: block !important; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h3>AcademiX <span class="text-info">AI</span></h3>
            <small>المساعد الأكاديمي الاحترافي</small>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item"><a href="#" class="nav-link active" onclick="showSection('research')"><i class="fas fa-microscope"></i> توليد البحوث</a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="showSection('summary')"><i class="fas fa-compress-alt"></i> تلخيص النصوص</a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="showSection('translate')"><i class="fas fa-language"></i> الترجمة الأكاديمية</a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="showSection('chat')"><i class="fas fa-robot"></i> دردشة ذكية</a></li>
        </ul>
    </nav>

    <div id="content">
        <button type="button" id="sidebarCollapse" class="btn btn-dark d-none mb-3">
            <i class="fas fa-bars"></i>
        </button>

        <section id="research-section" class="app-section">
            <div class="card p-4">
                <h4><i class="fas fa-pen-nib text-primary"></i> توليد بحث أكاديمي</h4>
                <div class="input-group mb-3 mt-3">
                    <input type="text" id="research-topic" class="form-control" placeholder="أدخل عنوان البحث أو الموضوع...">
                    <button class="btn btn-primary" onclick="handleAction('research')">توليد البحث</button>
                </div>
                <div class="loader" id="loader-research"></div>
                <div id="research-result" class="result-area mt-3">النتيجة ستظهر هنا...</div>
            </div>
        </section>

        <section id="summary-section" class="app-section d-none">
            <div class="card p-4">
                <h4><i class="fas fa-align-left text-success"></i> تلخيص النصوص</h4>
                <textarea id="summary-text" class="form-control mt-3" rows="5" placeholder="ضع النص الطويل هنا..."></textarea>
                <button class="btn btn-success mt-3" onclick="handleAction('summary')">لخّص الآن</button>
                <div class="loader" id="loader-summary"></div>
                <div id="summary-result" class="result-area mt-3">الملخص سيظهر هنا...</div>
            </div>
        </section>

        </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // دالة التنقل بين الأقسام
        function showSection(sectionId) {
            $('.app-section').addClass('d-none');
            $(`#${sectionId}-section`).removeClass('d-none');
            $('.nav-link').removeClass('active');
            $(event.target).closest('.nav-link').addClass('active');
        }

        // الدالة المركزية لإرسال الطلبات
        async function handleAction(type) {
            let endpoint, data, resultId, loaderId, payload;

            if (type === 'research') {
                const topic = document.getElementById('research-topic').value;
                if(!topic) return alert("يرجى إدخال عنوان!");
                endpoint = '/generate_research';
                payload = { topic: topic };
                resultId = 'research-result';
                loaderId = 'loader-research';
            } 
            else if (type === 'summary') {
                const text = document.getElementById('summary-text').value;
                if(!text) return alert("يرجى إدخال نص!");
                endpoint = '/summarize'; // تأكد من وجود هذا الـ route في app.py
                payload = { text: text };
                resultId = 'summary-result';
                loaderId = 'loader-summary';
            }

            // تنفيذ الطلب
            const resultDiv = document.getElementById(resultId);
            const loader = document.getElementById(loaderId);

            resultDiv.style.opacity = '0.5';
            loader.style.display = 'block';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                // عرض النتيجة (التي تم تحويلها لـ HTML في السيرفر)
                resultDiv.innerHTML = data.research || data.summary || data.response;
            } catch (error) {
                resultDiv.innerHTML = "حدث خطأ في جلب البيانات.";
            } finally {
                loader.style.display = 'none';
                resultDiv.style.opacity = '1';
            }
        }

        // Toggle Sidebar for Mobile
        $('#sidebarCollapse').on('click', function () {
            $('#sidebar').toggleClass('active');
        });
    </script>
</body>
</html>
