<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiX Pro | Professional Dark Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), 
                              radial-gradient(circle at bottom left, #0f172a, transparent);
            background-attachment: fixed;
            font-family: 'Cairo', 'Poppins', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: hidden;
            margin: 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 40px;
            margin: 20px auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-title { font-weight: 800; color: var(--text-main); letter-spacing: -1px; }

        .eng-tag {
            background: var(--accent-gold);
            color: #000;
            padding: 2px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .custom-input {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 12px !important;
            color: #fff !important;
            padding: 14px 20px !important;
        }

        .btn-generate {
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 10px 25px;
            font-weight: 700;
            transition: 0.3s;
        }

        .result-area {
            background: #ffffff; 
            color: #000000;
            border-radius: 16px;
            padding: 35px;
            margin-top: 30px;
            min-height: 500px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* تنسيق المحتوى الإنجليزي - إجباري لليسار */
        .ltr-dir { 
            direction: ltr !important; 
            text-align: left !important; 
        }
        .ltr-dir h1, .ltr-dir h2, .ltr-dir h3, .ltr-dir h4 { 
            text-align: left !important; 
            margin-top: 15px;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .ltr-dir p, .ltr-dir li { text-align: justify; line-height: 1.6; }

        /* تنسيق المحتوى العربي */
        .rtl-dir { 
            direction: rtl !important; 
            text-align: right !important; 
        }
        .rtl-dir h1, .rtl-dir h2, .rtl-dir h3, .rtl-dir h4 { 
            text-align: right !important; 
            border-bottom: 1px solid #eee;
        }

        .action-btns {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .btn-action {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #loader { display: none; margin: 20px 0; }
        .spinner-border { color: var(--accent-gold); }

        @media (max-width: 768px) {
            .glass-card { padding: 20px; }
            .btn-generate { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="glass-card text-center">
                <div class="mb-4">
                    <h1 class="header-title mb-2">ACADEMIX <span style="color: var(--accent-gold);">PRO</span></h1>
                    <div class="mb-3"><span class="eng-tag">ENG REDA EDITION</span></div>
                    <p class="text-white-50">توليد تقارير أكاديمية مكثفة وفورية</p>
                </div>

                <div class="input-group mb-4 shadow-sm">
                    <input type="text" id="topic" class="form-control custom-input" placeholder="عنوان التقرير...">
                    <button class="btn btn-generate" id="generateBtn" onclick="generateReport()">
                        <i class="fas fa-magic me-2"></i> توليد التقرير
                    </button>
                </div>

                <div id="loader">
                    <div class="spinner-border" role="status"></div>
                    <p class="mt-2 text-white-50">جاري الصياغة المكثفة...</p>
                </div>

                <div class="result-area" id="report-wrapper">
                    <div class="action-btns">
                        <button class="btn btn-action" onclick="copyText()"><i class="fas fa-copy"></i></button>
                        <button class="btn btn-action" onclick="downloadPDF()"><i class="fas fa-file-pdf"></i></button>
                    </div>
                    
                    <div id="output-content" class="rtl-dir">
                        <div class="text-center text-muted pt-5 mt-5">
                            بانتظار العنوان لبدء التقرير...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function generateReport() {
        const topic = document.getElementById('topic').value;
        const output = document.getElementById('output-content');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('generateBtn');

        if(!topic) return alert("أدخل الموضوع!");

        loader.style.display = "block";
        output.style.opacity = "0.3";
        btn.disabled = true;

        try {
            const response = await fetch('/generate_report', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ topic: topic })
            });

            const data = await response.json();
            const report = data.report;

            // كشف اللغة بعد تنظيف النص من علامات الـ Markdown
            const cleanText = report.replace(/[#*_]/g, '').trim();
            const isEnglish = /^[a-zA-Z]/.test(cleanText.substring(0, 20));

            output.className = isEnglish ? "ltr-dir" : "rtl-dir";
            output.innerHTML = marked.parse(report);
            output.style.opacity = "1";

        } catch (e) {
            output.innerHTML = "خطأ في الاتصال.";
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    function copyText() {
        const text = document.getElementById('output-content').innerText;
        navigator.clipboard.writeText(text);
        alert("✅ تم النسخ");
    }

    function downloadPDF() {
        const element = document.getElementById('output-content'); 
        html2pdf().from(element).set({
            margin: 0.5,
            filename: 'Report.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        }).save();
    }
</script>

</body>
</html>
