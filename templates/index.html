<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academix AI | Eng Reda</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1; --primary-glow: rgba(99, 102, 241, 0.4);
            --secondary: #a855f7; --accent: #00d2ff; --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; --text-dim: #94a3b8; --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }
        .sidebar { width: var(--sidebar-width); background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-left: 1px solid var(--glass-border); height: 100vh; position: fixed; right: 0; display: flex; flex-direction: column; padding: 2rem 1rem; z-index: 1000; }
        .main-content { margin-right: var(--sidebar-width); flex: 1; padding: 2rem; max-width: calc(100vw - var(--sidebar-width)); }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 3rem; }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--primary-glow); }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .nav-item.active { border-right: 4px solid var(--primary); background: rgba(99, 102, 241, 0.1); color: var(--text-main); }
        textarea { width: 100%; min-height: 150px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 15px; padding: 1rem; color: white; margin-bottom: 1.5rem; outline: none; resize: none; }
        .btn-glow { padding: 12px 25px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--primary-glow); }
        .output-paper { background: white; color: #1e293b; padding: 2.5rem; border-radius: 8px; line-height: 1.7; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-top: 1.5rem; direction: rtl; text-align: right; }
        .loader-wrapper { display: none; flex-direction: column; align-items: center; gap: 1rem; padding: 2rem; }
        .dna-spinner { width: 40px; height: 40px; border: 4px solid var(--glass-border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: auto; position: relative; border-left: none; } .main-content { margin-right: 0; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
            <h2>Academix</h2>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="showSection('generate')"><i class="fas fa-pen-nib"></i> <span>توليد تقرير</span></div>
            <div class="nav-item" onclick="showSection('summarize')"><i class="fas fa-file-alt"></i> <span>تلخيص PDF</span></div>
            <div class="nav-item" onclick="showSection('mcq')"><i class="fas fa-list-check"></i> <span>أسئلة MCQ</span></div>
        </div>
        <div style="margin-top: auto; text-align: center; color: var(--text-dim); font-size: 0.8rem;">
            Developed By <br> <strong style="color: var(--accent);">Eng Reda</strong>
        </div>
    </nav>

    <main class="main-content">
        <section id="input-section" class="glass-card">
            <div id="report-inputs">
                <h3><i class="fas fa-magic"></i> محرك البحث الأكاديمي</h3>
                <textarea id="report-prompt" placeholder="مثال: الأمن السيبراني في العراق..."></textarea>
                <button class="btn-glow" onclick="generateReport()">توليد الآن <i class="fas fa-rocket"></i></button>
            </div>

            <div id="file-inputs" style="display:none;">
                <h3 id="file-title">معالجة ملفات PDF</h3>
                <div style="border: 2px dashed var(--glass-border); padding: 2rem; text-align: center; border-radius: 15px; margin: 1rem 0; cursor: pointer;" onclick="document.getElementById('pdf-file').click()">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--primary);"></i>
                    <p id="file-status">اضغط لرفع الملف</p>
                    <input type="file" id="pdf-file" hidden accept=".pdf" onchange="document.getElementById('file-status').innerText = this.files[0].name">
                </div>
                <button id="process-btn" class="btn-glow">بدء المعالجة <i class="fas fa-bolt"></i></button>
            </div>
        </section>

        <div id="loader" class="loader-wrapper">
            <div class="dna-spinner"></div>
            <p>جاري المعالجة (6000 توكن)...</p>
        </div>

        <div id="result-area" style="display:none;">
            <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                <button onclick="copyContent()" class="btn-glow" style="background: #10b981; padding: 8px 15px;">
                    <i class="fas fa-copy"></i> نسخ النص
                </button>
                <button onclick="saveAsPDF()" class="btn-glow" style="background: #ef4444; padding: 8px 15px;">
                    <i class="fas fa-file-pdf"></i> حفظ كـ PDF
                </button>
            </div>
            <div id="output-content" class="output-paper"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        function showSection(mode) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('report-inputs').style.display = (mode === 'generate') ? 'block' : 'none';
            document.getElementById('file-inputs').style.display = (mode !== 'generate') ? 'block' : 'none';
            if(mode === 'summarize') document.getElementById('process-btn').onclick = summarizePDF;
            if(mode === 'mcq') document.getElementById('process-btn').onclick = generateMCQ;
            document.getElementById('result-area').style.display = 'none';
        }

        async function generateReport() {
            const p = document.getElementById('report-prompt').value;
            if(!p) return alert("اكتب الموضوع أولاً");
            apiCall('/generate', { prompt: p }, 'report');
        }

        async function summarizePDF() { fileApiCall('/summarize_pdf', 'summary'); }
        async function generateMCQ() { fileApiCall('/generate_mcq', 'questions'); }

        async function apiCall(url, body, resKey) {
            toggleLoader(true);
            try {
                const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
                const d = await r.json();
                display(d[resKey]);
            } catch(e) { alert("خطأ في الاتصال"); }
            toggleLoader(false);
        }

        async function fileApiCall(url, resKey) {
            const f = document.getElementById('pdf-file').files[0];
            if(!f) return alert("ارفع ملف أولاً");
            const fd = new FormData(); fd.append('file', f);
            toggleLoader(true);
            try {
                const r = await fetch(url, { method:'POST', body:fd });
                const d = await r.json();
                display(d[resKey] || d.summary || d.questions);
            } catch(e) { alert("خطأ في السيرفر"); }
            toggleLoader(false);
        }

        function display(content) {
            document.getElementById('output-content').innerHTML = marked.parse(content || "لا توجد نتائج");
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
        }

        function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

        // ميزة النسخ [cite: 202]
        function copyContent() {
            const text = document.getElementById('output-content').innerText;
            navigator.clipboard.writeText(text).then(() => alert("تم نسخ النص بنجاح!"));
        }

        // ميزة حفظ PDF [cite: 177]
        function saveAsPDF() {
            const element = document.getElementById('output-content');
            const opt = {
                margin: 0.5,
                filename: 'Academix_Report.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
