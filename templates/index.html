<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academix AI Pro | المساعد الأكاديمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root { --primary: #6366f1; --bg-dark: #0f172a; --text-main: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; }
        
        /* تنسيق الورقة الأكاديمية لمنع خربشة اللغات */
        #academic-paper-content {
            background: white; color: #1e293b; padding: 40px; border-radius: 10px;
            direction: ltr; text-align: left; /* الأساس يسار للإنجليزي */
        }

        /* كود سحري: أي فقرة تحتوي عربي تتحول لليمين تلقائياً */
        .content-block { margin-bottom: 20px; display: block; }
        .arabic-text { direction: rtl; text-align: right; font-weight: 600; color: #000; display: block; }
        .english-text { direction: ltr; text-align: left; color: #334155; display: block; margin-bottom: 5px; }

        .navbar { padding: 20px; background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        
        .upload-zone { border: 2px dashed var(--primary); padding: 40px; border-radius: 15px; cursor: pointer; margin-bottom: 30px; }
        .main-btn { padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; font-size: 1rem; color: white; transition: 0.3s; }
        .btn-primary { background: var(--primary); }
        .btn-accent { background: #10b981; }
        
        #result-wrapper { display: none; margin-top: 30px; }
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .spinner { width: 50px; height: 50px; border: 5px solid white; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">ACADEMIX AI</div>
        <button onclick="location.reload()" class="main-btn" style="background: #334155;">ملف جديد</button>
    </nav>

    <div class="container">
        <div id="input-container" class="glass-card">
            <h1>المساعد الأكاديمي الذكي</h1>
            <p>لخص ملزمتك، اصنع أسئلتك، واضمن نجاحك</p>
            
            <div class="upload-zone" onclick="document.getElementById('pdf-file').click()">
                <i class="fas fa-file-pdf fa-3x"></i>
                <h3 id="file-name">اضغط لرفع الملف (PDF)</h3>
                <input type="file" id="pdf-file" hidden accept="application/pdf">
            </div>

            <button class="main-btn btn-primary" onclick="startProcess('/summarize_pdf')">تلخيص وشرح المنهج</button>
            <button class="main-btn btn-accent" onclick="startProcess('/generate_mcq')">توليد أسئلة MCQ</button>
        </div>

        <div id="result-wrapper">
            <div style="margin-bottom: 20px; text-align: center;">
                <button class="main-btn btn-primary" onclick="exportPDF()"><i class="fas fa-download"></i> تحميل كـ PDF</button>
                <button class="main-btn btn-accent" onclick="copyText()"><i class="fas fa-copy"></i> نسخ النص</button>
            </div>
            <div id="academic-paper-content"></div>
        </div>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <h2 style="margin-top: 20px;">جاري تحليل المنهج...</h2>
    </div>

    <script>
        document.getElementById('pdf-file').onchange = function() {
            document.getElementById('file-name').innerText = this.files[0].name;
        };

        async function startProcess(url) {
            const file = document.getElementById('pdf-file').files[0];
            if(!file) return alert("ارفع الملف أولاً!");

            const fd = new FormData();
            fd.append('file', file);

            document.getElementById('loader').style.display = 'flex';

            try {
                const res = await fetch(url, { method: 'POST', body: fd });
                const data = await res.json();
                renderContent(data.summary || data.questions);
            } catch (e) {
                alert("حدث خطأ في السيرفر، حاول مرة أخرى.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderContent(text) {
            const container = document.getElementById('academic-paper-content');
            const lines = text.split('\n');
            let html = "";

            lines.forEach(line => {
                if(line.trim() === "") return;
                const isArabic = /[\u0600-\u06FF]/.test(line);
                html += `<span class="${isArabic ? 'arabic-text' : 'english-text'}">${line}</span>`;
            });

            container.innerHTML = html;
            document.getElementById('input-container').style.display = 'none';
            document.getElementById('result-wrapper').style.display = 'block';
        }

        function exportPDF() {
            const element = document.getElementById('academic-paper-content');
            html2pdf().from(element).save('Academix_Report.pdf');
        }

        function copyText() {
            const text = document.getElementById('academic-paper-content').innerText;
            navigator.clipboard.writeText(text);
            alert("تم النسخ!");
        }
    </script>
</body>
</html>
