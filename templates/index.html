<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiX Pro | Professional Dark Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), 
                              radial-gradient(circle at bottom left, #0f172a, transparent);
            background-attachment: fixed;
            font-family: 'Cairo', 'Poppins', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: hidden;
            margin: 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 40px;
            margin: 20px auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-title {
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .eng-tag {
            background: var(--accent-gold);
            color: #000;
            padding: 2px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .custom-input {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 12px !important;
            color: #fff !important;
            padding: 14px 20px !important;
        }

        .custom-input::placeholder { color: #94a3b8; }

        .btn-generate {
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 10px 25px;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.3);
            background: #fff;
        }

        .result-area {
            background: #f8fafc; 
            color: #1e293b;
            border-radius: 16px;
            padding: 35px;
            margin-top: 30px;
            min-height: 450px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .action-btns {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .btn-action {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            background: #fff;
            border: 1px solid #e2e8f0;
            color: #475569;
        }

        .btn-action:hover { background: #f1f5f9; color: var(--bg-dark); }

        #loader { display: none; margin: 30px 0; }
        .spinner-border { color: var(--accent-gold); width: 3rem; height: 3rem; }

        /* محاذاة العناوين والفقرات للتقرير الإنجليزي */
        .ltr-dir { direction: ltr !important; text-align: left !important; }
        .ltr-dir h1, .ltr-dir h2, .ltr-dir h3, .ltr-dir h4 { text-align: left !important; width: 100%; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-top: 20px; }
        .ltr-dir p, .ltr-dir li { text-align: justify; }

        /* محاذاة التقرير العربي */
        .rtl-dir { direction: rtl !important; text-align: right !important; }
        .rtl-dir h1, .rtl-dir h2, .rtl-dir h3, .rtl-dir h4 { text-align: right !important; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-top: 20px; }

        @media (max-width: 768px) {
            .glass-card { padding: 25px 15px; margin: 10px; }
            .input-group { flex-direction: column; }
            .btn-generate { width: 100%; margin-top: 10px; border-radius: 12px !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="glass-card text-center">
                <div class="mb-4">
                    <h1 class="header-title mb-2">ACADEMIX <span style="color: var(--accent-gold);">PRO</span></h1>
                    <div class="mb-3"><span class="eng-tag">ENG REDA EDITION</span></div>
                    <p class="text-white-50">نظام الذكاء الاصطناعي الأكاديمي لتوليد التقارير المكثفة</p>
                </div>

                <div class="input-group mb-4 shadow-sm">
                    <input type="text" id="topic" class="form-control custom-input" placeholder="اكتب عنوان التقرير (مثال: Renewable Energy Systems)...">
                    <button class="btn btn-generate" id="generateBtn" onclick="generateReport()">
                        <i class="fas fa-magic me-2"></i> توليد التقرير
                    </button>
                </div>

                <div id="loader">
                    <div class="spinner-border" role="status"></div>
                    <p class="mt-3 fw-bold text-white-50">جاري صياغة تقرير مكثف وحصري لـ Eng Reda...</p>
                </div>

                <div class="result-area shadow" id="report-wrapper">
                    <div class="action-btns">
                        <button class="btn btn-action" onclick="copyText()" title="نسخ"><i class="fas fa-copy"></i></button>
                        <button class="btn btn-action" onclick="downloadPDF()" title="تحميل PDF"><i class="fas fa-file-pdf"></i></button>
                    </div>
                    
                    <div id="output-content" class="rtl-dir">
                        <div class="text-center text-muted pt-5 mt-5">
                            <i class="fas fa-terminal fa-3x d-block mb-3 opacity-25"></i>
                            أدخل الموضوع وسأقوم بإنشاء تقرير أكاديمي كامل فوراً
                        </div>
                    </div>
                </div>

                <div class="mt-4 text-white-50 small">
                    Engineered with Excellence | 2024
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function generateReport() {
        const topic = document.getElementById('topic').value;
        const output = document.getElementById('output-content');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('generateBtn');

        if(!topic) {
            alert("يرجى إدخال الموضوع يا هندسة!");
            return;
        }

        loader.style.display = "block";
        output.style.opacity = "0.2";
        btn.disabled = true;

        try {
            const response = await fetch('/generate_report', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ topic: topic })
            });

            const data = await response.json();
            if(data.error) throw new Error(data.error);

            const report = data.report;

            // كشف اللغة تلقائياً وضبط اتجاه الصفحة
            // نتحقق من أول 100 حرف لمعرفة هل هي إنجليزية أم لا
            const isEnglish = /^[a-zA-Z\s,.]+$/.test(report.trim().substring(0, 50).replace(/[#*]/g, ''));
            output.className = isEnglish ? "ltr-dir" : "rtl-dir";

            // تحويل الـ Markdown إلى HTML وعرضه فوراً
            output.innerHTML = marked.parse(report);
            output.style.opacity = "1";

        } catch (e) {
            output.innerHTML = `<div class="alert alert-danger">خطأ: ${e.message}</div>`;
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    function copyText() {
        const text = document.getElementById('output-content').innerText;
        navigator.clipboard.writeText(text);
        alert("✅ تم نسخ التقرير المكثف بنجاح");
    }

    function downloadPDF() {
        const element = document.getElementById('output-content'); 
        const isEnglish = element.classList.contains('ltr-dir');
        
        const opt = {
            margin: [0.5, 0.5],
            filename: `Academic_Report_${new Date().getTime()}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
