<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiX Pro | Professional Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), 
                              radial-gradient(circle at bottom left, #0f172a, transparent);
            background-attachment: fixed;
            font-family: 'Cairo', 'Poppins', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: hidden;
            margin: 0;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            margin: 20px auto;
        }

        .header-title { font-weight: 800; color: var(--text-main); letter-spacing: -1px; }

        .custom-input {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 12px !important;
            color: #fff !important;
        }

        .btn-generate {
            background: var(--accent-gold);
            color: #000;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
        }

        /* منطقة النتائج */
        .result-area {
            background: #ffffff; 
            color: #000000;
            border-radius: 16px;
            padding: 35px;
            margin-top: 30px;
            min-height: 500px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* أدوات التحكم الجانبية */
        .controls-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .font-slider-box {
            background: #f1f5f9;
            padding: 5px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #e2e8f0;
        }

        .font-slider-box label { font-size: 12px; font-weight: bold; color: #475569; }

        .btn-action {
            width: 35px; height: 35px;
            border-radius: 8px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-action:hover { background: #e2e8f0; }

        /* تنسيق التقرير */
        #output-content { font-size: 16px; transition: 0.2s; }
        .ltr-dir { direction: ltr !important; text-align: left !important; }
        .ltr-dir h1, .ltr-dir h2, .ltr-dir h3 { border-bottom: 2px solid #fbbf24; padding-bottom: 5px; margin-top: 25px; text-align: left !important;}
        .rtl-dir { direction: rtl !important; text-align: right !important; }
        .rtl-dir h1, .rtl-dir h2, .rtl-dir h3 { border-bottom: 2px solid #fbbf24; padding-bottom: 5px; margin-top: 25px; text-align: right !important;}
        
        #loader { display: none; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="glass-card text-center shadow">
                <div class="mb-4">
                    <h1 class="header-title mb-2">ACADEMIX <span style="color: var(--accent-gold);">PRO</span></h1>
                    <p class="text-white-50">نظام التقارير الأكاديمية الذكي لـ Eng Reda</p>
                </div>

                <div class="input-group mb-4">
                    <input type="text" id="topic" class="form-control custom-input" placeholder="عنوان التقرير...">
                    <button class="btn btn-generate" id="generateBtn" onclick="generateReport()">
                        <i class="fas fa-magic me-2"></i> توليد التقرير
                    </button>
                </div>

                <div id="loader">
                    <div class="spinner-border text-warning" role="status"></div>
                    <p class="mt-2 text-white-50">جاري صياغة التقرير وتنسيقه...</p>
                </div>

                <div class="result-area" id="report-wrapper">
                    <div class="controls-panel">
                        <div class="d-flex gap-2">
                            <button class="btn btn-action" onclick="copyText()" title="نسخ النص"><i class="fas fa-copy"></i></button>
                            <button class="btn btn-action text-danger" onclick="downloadPDF()" title="تحميل PDF"><i class="fas fa-file-pdf"></i></button>
                        </div>
                        
                        <div class="font-slider-box">
                            <label><i class="fas fa-text-height"></i> حجم الخط</label>
                            <input type="range" id="fontSize" min="12" max="24" value="16" oninput="changeFontSize(this.value)">
                        </div>
                    </div>
                    
                    <div id="output-content" class="rtl-dir pt-4">
                        <div class="text-center text-muted pt-5 mt-5">
                            <i class="fas fa-file-alt fa-3x mb-3 opacity-25"></i><br>
                            أدخل العنوان وسأقوم بإنشاء ملف أكاديمي متكامل
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // تغيير حجم الخط فورا
    function changeFontSize(size) {
        document.getElementById('output-content').style.fontSize = size + "px";
    }

    async function generateReport() {
        const topic = document.getElementById('topic').value;
        const output = document.getElementById('output-content');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('generateBtn');

        if(!topic) return alert("أدخل الموضوع!");

        loader.style.display = "block";
        output.style.opacity = "0.3";
        btn.disabled = true;

        try {
            const response = await fetch('/generate_report', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ topic: topic })
            });

            const data = await response.json();
            const report = data.report;

            const cleanText = report.replace(/[#*_]/g, '').trim();
            const isEnglish = /^[a-zA-Z]/.test(cleanText.substring(0, 20));

            output.className = isEnglish ? "ltr-dir pt-4" : "rtl-dir pt-4";
            output.innerHTML = marked.parse(report);
            output.style.opacity = "1";

        } catch (e) {
            output.innerHTML = "حدث خطأ في جلب البيانات.";
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    function copyText() {
        const text = document.getElementById('output-content').innerText;
        navigator.clipboard.writeText(text);
        alert("✅ تم النسخ بنجاح");
    }

    function downloadPDF() {
        const element = document.getElementById('output-content');
        const currentFontSize = document.getElementById('fontSize').value;
        const isEnglish = element.classList.contains('ltr-dir');

        // إنشاء نسخة نظيفة تماماً للطباعة
        const printContainer = document.createElement('div');
        printContainer.innerHTML = element.innerHTML;
        printContainer.style.padding = "40px";
        printContainer.style.fontSize = currentFontSize + "px";
        printContainer.style.color = "#000";
        printContainer.style.backgroundColor = "#fff";
        printContainer.style.direction = isEnglish ? "ltr" : "rtl";
        printContainer.style.textAlign = "justify";
        printContainer.style.fontFamily = "Arial, sans-serif";

        const opt = {
            margin: 0.5,
            filename: 'Academic_Report_Pro.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, backgroundColor: '#ffffff' },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(printContainer).save();
    }
</script>

</body>
</html>
